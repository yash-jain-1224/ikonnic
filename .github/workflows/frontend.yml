# ─────────────────────────────────────────────────────────────────────
# GitHub Actions - Frontend CI Pipeline
# Type-check and Build the Next.js storefront
# (Production deploys are handled by Vercel's Git integration)
# ─────────────────────────────────────────────────────────────────────

name: Frontend - CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'backend/**'
      - 'infrastructure/**'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'backend/**'
      - 'infrastructure/**'
      - '**.md'

jobs:
  build-and-check:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.ikonnic.com/api/v1
          NEXT_TELEMETRY_DISABLED: '1'
