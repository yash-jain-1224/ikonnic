apiVersion: apps/v1
kind: Deployment
metadata:
  name: ikonnic-api
  labels:
    app: ikonnic-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ikonnic-api
  template:
    metadata:
      labels:
        app: ikonnic-api
    spec:
      containers:
        - name: api
          image: ikonnic/backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: ikonnic-secrets
            - configMapRef:
                name: ikonnic-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ikonnic-api-service
spec:
  selector:
    app: ikonnic-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ikonnic-api-ingress
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.ikonnic.com
      secretName: ikonnic-api-tls
  rules:
    - host: api.ikonnic.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ikonnic-api-service
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ikonnic-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ikonnic-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
