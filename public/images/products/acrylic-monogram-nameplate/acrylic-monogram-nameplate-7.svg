<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="grad_acrylic-monogram-nameplate_6" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="hsl(238, 25%, 96%)" />
            <stop offset="50%" stop-color="hsl(258, 20%, 93%)" />
            <stop offset="100%" stop-color="hsl(283, 30%, 88%)" />
        </linearGradient>
        <!-- Mockup Surface Gradient -->
        <linearGradient id="mock_grad_acrylic-monogram-nameplate_6" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="hsl(248, 45%, 85%)" />
            <stop offset="100%" stop-color="hsl(273, 40%, 65%)" />
        </linearGradient>
        <!-- Metallic Studs Gradient -->
        <linearGradient id="stud_grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="40%" stop-color="#d4af37" />
            <stop offset="100%" stop-color="#aa7c11" />
        </linearGradient>
    </defs>
    
    <!-- Background Card -->
    <rect width="400" height="300" rx="20" fill="url(#grad_acrylic-monogram-nameplate_6)" />
    
    <!-- Outer Elegant Frame -->
    <rect x="15" y="15" width="370" height="270" rx="12" fill="none" stroke="hsl(238, 20%, 80%)" stroke-width="1" stroke-opacity="0.5" />
    
    <!-- Brand Tag -->
    <text x="200" y="45" font-family="'Georgia', serif" font-size="11" font-weight="900" fill="#7a6b58" text-anchor="middle" letter-spacing="4">G I F T O R A</text>
    <circle cx="200" cy="55" r="1.5" fill="#cfae81" />
    
    <!-- Mockup Visualization -->
    
        <!-- Acrylic Photo Outline -->
        <rect x="140.0" y="80.0" width="120" height="90" rx="6" fill="url(#mock_grad_acrylic-monogram-nameplate_6)" stroke="#e5dfd3" stroke-width="2" filter="drop-shadow(0px 12px 18px rgba(0,0,0,0.18))" />
        <!-- Inner Border (double border representation) -->
        <rect x="146.0" y="86.0" width="108" height="78" rx="3" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4" />
        <!-- Reflection highlight -->
        <path d="M 140.0 80.0 L 190.0 80.0 L 140.0 160.0 Z" fill="#ffffff" fill-opacity="0.25" />
        
            <!-- Metallic wall studs for Name Plates -->
            <circle cx="148.0" cy="88.0" r="4" fill="url(#stud_grad)" stroke="#9c8053" stroke-width="1" />
            <circle cx="252.0" cy="88.0" r="4" fill="url(#stud_grad)" stroke="#9c8053" stroke-width="1" />
            <circle cx="148.0" cy="162.0" r="4" fill="url(#stud_grad)" stroke="#9c8053" stroke-width="1" />
            <circle cx="252.0" cy="162.0" r="4" fill="url(#stud_grad)" stroke="#9c8053" stroke-width="1" />
            
        
    
    <!-- Info Footer on Card -->
    <text x="200" y="240" font-family="'Inter', sans-serif" font-size="13" font-weight="900" fill="#2d251e" text-anchor="middle" letter-spacing="0.5">Acrylic Monogram Nameplate #7</text>
    <text x="200" y="258" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#7a6f62" text-anchor="middle" letter-spacing="1">ACRYLIC-MONOGRAM-NAMEPLATE-7</text>
    
    <!-- Small Decorative Corner Lines -->
    <path d="M 25 35 L 25 25 L 35 25" fill="none" stroke="#bda688" stroke-width="1.5" />
    <path d="M 375 35 L 375 25 L 365 25" fill="none" stroke="#bda688" stroke-width="1.5" />
    <path d="M 25 265 L 25 275 L 35 275" fill="none" stroke="#bda688" stroke-width="1.5" />
    <path d="M 375 265 L 375 275 L 365 275" fill="none" stroke="#bda688" stroke-width="1.5" />
</svg>