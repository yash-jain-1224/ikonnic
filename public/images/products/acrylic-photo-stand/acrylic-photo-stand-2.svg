<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="grad_acrylic-photo-stand_1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="hsl(2, 25%, 96%)" />
            <stop offset="50%" stop-color="hsl(22, 20%, 93%)" />
            <stop offset="100%" stop-color="hsl(47, 30%, 88%)" />
        </linearGradient>
        <!-- Mockup Surface Gradient -->
        <linearGradient id="mock_grad_acrylic-photo-stand_1" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="hsl(12, 45%, 85%)" />
            <stop offset="100%" stop-color="hsl(37, 40%, 65%)" />
        </linearGradient>
        <!-- Metallic Studs Gradient -->
        <linearGradient id="stud_grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="40%" stop-color="#d4af37" />
            <stop offset="100%" stop-color="#aa7c11" />
        </linearGradient>
    </defs>
    
    <!-- Background Card -->
    <rect width="400" height="300" rx="20" fill="url(#grad_acrylic-photo-stand_1)" />
    
    <!-- Outer Elegant Frame -->
    <rect x="15" y="15" width="370" height="270" rx="12" fill="none" stroke="hsl(2, 20%, 80%)" stroke-width="1" stroke-opacity="0.5" />
    
    <!-- Brand Tag -->
    <text x="200" y="45" font-family="'Georgia', serif" font-size="11" font-weight="900" fill="#7a6b58" text-anchor="middle" letter-spacing="4">G I F T O R A</text>
    <circle cx="200" cy="55" r="1.5" fill="#cfae81" />
    
    <!-- Mockup Visualization -->
    
        <!-- Wooden Stand Base -->
        <ellipse cx="200" cy="170" rx="65" ry="10" fill="#8b5a2b" stroke="#5c3a1a" stroke-width="1.5" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.2))" />
        <!-- Acrylic Block -->
        <rect x="145.0" y="80.0" width="110" height="80" rx="6" fill="url(#mock_grad_acrylic-photo-stand_1)" stroke="#ffffff" stroke-width="2" filter="drop-shadow(0px 8px 12px rgba(0,0,0,0.15))" />
        <!-- Transparent Bevel Edge Effect -->
        <rect x="145.0" y="80.0" width="110" height="80" rx="6" fill="none" stroke="#e6dfd3" stroke-width="1" stroke-opacity="0.7" />
        <!-- Reflection Angle -->
        <path d="M 145.0 80.0 L 180.0 80.0 L 145.0 150.0 Z" fill="#ffffff" fill-opacity="0.25" />
        
    
    <!-- Info Footer on Card -->
    <text x="200" y="240" font-family="'Inter', sans-serif" font-size="13" font-weight="900" fill="#2d251e" text-anchor="middle" letter-spacing="0.5">Acrylic Photo Stand #2</text>
    <text x="200" y="258" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#7a6f62" text-anchor="middle" letter-spacing="1">ACRYLIC-PHOTO-STAND-2</text>
    
    <!-- Small Decorative Corner Lines -->
    <path d="M 25 35 L 25 25 L 35 25" fill="none" stroke="#bda688" stroke-width="1.5" />
    <path d="M 375 35 L 375 25 L 365 25" fill="none" stroke="#bda688" stroke-width="1.5" />
    <path d="M 25 265 L 25 275 L 35 275" fill="none" stroke="#bda688" stroke-width="1.5" />
    <path d="M 375 265 L 375 275 L 365 275" fill="none" stroke="#bda688" stroke-width="1.5" />
</svg>