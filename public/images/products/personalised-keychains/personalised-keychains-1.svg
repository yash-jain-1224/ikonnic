<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="grad_personalised-keychains_0" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="hsl(101, 25%, 96%)" />
            <stop offset="50%" stop-color="hsl(121, 20%, 93%)" />
            <stop offset="100%" stop-color="hsl(146, 30%, 88%)" />
        </linearGradient>
        <!-- Mockup Surface Gradient -->
        <linearGradient id="mock_grad_personalised-keychains_0" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="hsl(111, 45%, 85%)" />
            <stop offset="100%" stop-color="hsl(136, 40%, 65%)" />
        </linearGradient>
        <!-- Metallic Studs Gradient -->
        <linearGradient id="stud_grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="40%" stop-color="#d4af37" />
            <stop offset="100%" stop-color="#aa7c11" />
        </linearGradient>
    </defs>
    
    <!-- Background Card -->
    <rect width="400" height="300" rx="20" fill="url(#grad_personalised-keychains_0)" />
    
    <!-- Outer Elegant Frame -->
    <rect x="15" y="15" width="370" height="270" rx="12" fill="none" stroke="hsl(101, 20%, 80%)" stroke-width="1" stroke-opacity="0.5" />
    
    <!-- Brand Tag -->
    <text x="200" y="45" font-family="'Georgia', serif" font-size="11" font-weight="900" fill="#7a6b58" text-anchor="middle" letter-spacing="4">G I F T O R A</text>
    <circle cx="200" cy="55" r="1.5" fill="#cfae81" />
    
    <!-- Mockup Visualization -->
    
        
            <!-- Metal Chain Ring -->
            <circle cx="200" cy="70.0" r="12" fill="none" stroke="#a0a0a0" stroke-width="3" />
            <line x1="200" y1="70.0" x2="200" y2="85.0" stroke="#c0c0c0" stroke-width="3" />
            
        <!-- Body -->
        <rect x="155.0" y="85.0" width="90" height="90" rx="18" fill="url(#mock_grad_personalised-keychains_0)" stroke="#d4af37" stroke-width="2" filter="drop-shadow(0px 8px 12px rgba(0,0,0,0.12))" />
        <rect x="159.0" y="89.0" width="82" height="82" rx="14" fill="none" stroke="#ffffff" stroke-dasharray="4,3" stroke-opacity="0.6" />
        <!-- Soft Inner Image Frame representation -->
        <circle cx="200" cy="125" r="22" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1" />
        <path d="M 188 132 Q 200 120 212 132" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.8" />
        
    
    <!-- Info Footer on Card -->
    <text x="200" y="240" font-family="'Inter', sans-serif" font-size="13" font-weight="900" fill="#2d251e" text-anchor="middle" letter-spacing="0.5">Personalised Keychains #1</text>
    <text x="200" y="258" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#7a6f62" text-anchor="middle" letter-spacing="1">PERSONALISED-KEYCHAINS-1</text>
    
    <!-- Small Decorative Corner Lines -->
    <path d="M 25 35 L 25 25 L 35 25" fill="none" stroke="#bda688" stroke-width="1.5" />
    <path d="M 375 35 L 375 25 L 365 25" fill="none" stroke="#bda688" stroke-width="1.5" />
    <path d="M 25 265 L 25 275 L 35 275" fill="none" stroke="#bda688" stroke-width="1.5" />
    <path d="M 375 265 L 375 275 L 365 275" fill="none" stroke="#bda688" stroke-width="1.5" />
</svg>