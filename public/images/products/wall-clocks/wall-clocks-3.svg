<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="grad_wall-clocks_2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="hsl(326, 25%, 96%)" />
            <stop offset="50%" stop-color="hsl(346, 20%, 93%)" />
            <stop offset="100%" stop-color="hsl(11, 30%, 88%)" />
        </linearGradient>
        <!-- Mockup Surface Gradient -->
        <linearGradient id="mock_grad_wall-clocks_2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="hsl(336, 45%, 85%)" />
            <stop offset="100%" stop-color="hsl(1, 40%, 65%)" />
        </linearGradient>
        <!-- Metallic Studs Gradient -->
        <linearGradient id="stud_grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="40%" stop-color="#d4af37" />
            <stop offset="100%" stop-color="#aa7c11" />
        </linearGradient>
    </defs>
    
    <!-- Background Card -->
    <rect width="400" height="300" rx="20" fill="url(#grad_wall-clocks_2)" />
    
    <!-- Outer Elegant Frame -->
    <rect x="15" y="15" width="370" height="270" rx="12" fill="none" stroke="hsl(326, 20%, 80%)" stroke-width="1" stroke-opacity="0.5" />
    
    <!-- Brand Tag -->
    <text x="200" y="45" font-family="'Georgia', serif" font-size="11" font-weight="900" fill="#7a6b58" text-anchor="middle" letter-spacing="4">G I F T O R A</text>
    <circle cx="200" cy="55" r="1.5" fill="#cfae81" />
    
    <!-- Mockup Visualization -->
    
        <!-- Clock Face -->
        <circle cx="200" cy="130" r="65" fill="url(#mock_grad_wall-clocks_2)" stroke="#b89a6c" stroke-width="2" filter="drop-shadow(0px 8px 12px rgba(0,0,0,0.15))" />
        <circle cx="200" cy="130" r="59" fill="none" stroke="#e6dfd3" stroke-width="1" />
        <!-- Clock Numbers/Ticks -->
        <circle cx="200" cy="130" r="3" fill="#3a3020" />
        <line x1="200" y1="75" x2="200" y2="80" stroke="#3a3020" stroke-width="2" />
        <line x1="200" y1="180" x2="200" y2="185" stroke="#3a3020" stroke-width="2" />
        <line x1="145" y1="130" x2="150" y2="130" stroke="#3a3020" stroke-width="2" />
        <line x1="250" y1="130" x2="255" y2="130" stroke="#3a3020" stroke-width="2" />
        <!-- Hands -->
        <line x1="200" y1="130" x2="235" y2="110" stroke="#1f1a10" stroke-width="2" stroke-linecap="round" />
        <line x1="200" y1="130" x2="200" y2="175" stroke="#1f1a10" stroke-width="1.5" stroke-linecap="round" />
        <!-- Clock Label -->
        <text x="200" y="155" font-family="'Times New Roman', serif" font-size="10" font-weight="bold" fill="#3a3020" text-anchor="middle" letter-spacing="1">GIFTORA</text>
        
    
    <!-- Info Footer on Card -->
    <text x="200" y="240" font-family="'Inter', sans-serif" font-size="13" font-weight="900" fill="#2d251e" text-anchor="middle" letter-spacing="0.5">Wall Clocks #3</text>
    <text x="200" y="258" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#7a6f62" text-anchor="middle" letter-spacing="1">WALL-CLOCKS-3</text>
    
    <!-- Small Decorative Corner Lines -->
    <path d="M 25 35 L 25 25 L 35 25" fill="none" stroke="#bda688" stroke-width="1.5" />
    <path d="M 375 35 L 375 25 L 365 25" fill="none" stroke="#bda688" stroke-width="1.5" />
    <path d="M 25 265 L 25 275 L 35 275" fill="none" stroke="#bda688" stroke-width="1.5" />
    <path d="M 375 265 L 375 275 L 365 275" fill="none" stroke="#bda688" stroke-width="1.5" />
</svg>